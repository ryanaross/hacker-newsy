<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>hacker news</title>
		<meta name="description" content="Hacker News Web App" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" type="image/png" sizes="196x196" href="%sveltekit.assets%/favicon-196.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-icon-180.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		%sveltekit.head%
		<script>
			(function() {
				var t = 'light'; try { t = JSON.parse(localStorage.getItem('theme')) || 'light' } catch(e) {}
				if (t !== 'light') document.documentElement.classList.add(t);
				var f = 'system'; try { f = JSON.parse(localStorage.getItem('fontFamily')) || 'system' } catch(e) {}
				if (f === 'serif') document.documentElement.classList.add('font-serif');
				else if (f === 'mono') document.documentElement.classList.add('font-mono');
			})();
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
